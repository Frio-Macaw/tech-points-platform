<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install</title>
  <link rel="stylesheet" href="style.css?v=20260225_3">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="Logo-Macaw-สีดำ1.png" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="title">ลงติดตั้ง</div>
      <div class="badge">Install</div>
    </div>
  </div>

  <div class="card">
    <div class="mini">UserId: <span id="userId">-</span></div>

    <label>Dealer</label>
    <input id="dealer" placeholder="เช่น D1">

    <label>BTU</label>
    <select id="btu">
      <option value="">เลือก</option>
      <option>09-12</option>
      <option>18-24</option>
    </select>

    <label>Serial Number</label>
    <input id="serialNumber" placeholder="SN...">

    <label>รูป Serial Number (ไม่บังคับ)</label>
    <input id="serialNumberPhoto" type="file" accept="image/*" capture="environment">

    <label>รูปติดตั้ง (ไม่บังคับ)</label>
    <input id="installPhoto" type="file" accept="image/*" capture="environment">

    <div class="hr"></div>
    <button class="btn primary" onclick="submitInstall()">บันทึก</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="location.href='index.html'">กลับเมนู</button>
    <div id="toast" class="mini"></div>
    <div id="resultBox" class="result-box"></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-starter.js?v=20260225_3"></script>
<script>
function fileToDataUrlRaw_(file){
  return new Promise((resolve) => {
    if (!file) return resolve("");
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => resolve("");
    reader.readAsDataURL(file);
  });
}

// ✅ Safe compress: ไม่ค้าง + มี timeout + ถ้าย่อไม่ได้จะคืน "" แล้วส่ง text ต่อได้
async function fileToDataUrl_(file, opt = {}){
  const {
    maxW = 2000,
    quality = 0.88,
    timeoutMs = 8000,      // กันค้างใน LINE webview
    forceJpeg = true
  } = opt;

  if (!file) return "";

  // กันรูปไฟล์ใหญ่มาก ๆ (บางเครื่อง 10-20MB) -> ลดโอกาสพัง
  // ถ้าเกิน 12MB ให้ไม่ส่งรูป (ส่ง text อย่างเดียว)
  if (file.size && file.size > 12 * 1024 * 1024) return "";

  const timeoutPromise = new Promise((resolve) => setTimeout(() => resolve(""), timeoutMs));

  const workPromise = (async () => {
    try{
      // 1) อ่านเป็น dataURL ก่อน (เสถียรกว่า blob url ใน LINE บางรุ่น)
      const dataUrl = await fileToDataUrlRaw_(file);
      if (!dataUrl) return "";

      // 2) โหลดเข้า Image
      const img = new Image();
      const loaded = new Promise((res, rej)=>{ img.onload=res; img.onerror=rej; });
      img.src = dataUrl;
      await loaded;

      // 3) ย่อ
      const scale = Math.min(1, maxW / img.width);
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));

      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.drawImage(img, 0, 0, w, h);

      // 4) export
      if (forceJpeg) return canvas.toDataURL("image/jpeg", quality);
      return canvas.toDataURL(file.type || "image/png", quality);
    }catch(_){
      return "";
    }
  })();

  // ✅ ถ้าเกินเวลา -> คืน "" เพื่อไม่บล็อกการยิง API
  return await Promise.race([workPromise, timeoutPromise]);
}

function showResult_(type, msg){
  let box = document.getElementById("resultBox");

  // ✅ ถ้าไม่มี resultBox ให้สร้างเองและแปะท้าย card
  if (!box) {
    const card = document.querySelector(".card");
    box = document.createElement("div");
    box.id = "resultBox";
    box.className = "result-box";
    if (card) card.appendChild(box);
    else document.body.appendChild(box);
  }

  box.className = "result-box " + (type === "ok" ? "result-ok" : type === "warn" ? "result-warn" : "result-err");
  box.textContent = msg;

  // ✅ ให้เลื่อนมาที่ข้อความเสมอ
  box.scrollIntoView({ behavior: "smooth", block: "nearest" });

  // fallback กันกรณี CSS/DOM แปลก ๆ
  toast(msg, type === "ok");
}
  
async function submitInstall(){
  try{
    const p = await waitProfile_();
    if (!p) return showResult_("err", "❌ LIFF ยังไม่พร้อม กรุณาลองใหม่");

    const dealer = document.getElementById("dealer").value.trim();
    const btu = document.getElementById("btu").value;
    const serialNumber = document.getElementById("serialNumber").value.trim();

    if (!dealer) return showResult_("err", "❌ กรุณากรอก Dealer");
    if (!btu) return showResult_("err", "❌ กรุณาเลือก BTU");
    if (!serialNumber) return showResult_("err", "❌ กรุณากรอก Serial Number");

    const snFile = document.getElementById("serialNumberPhoto")?.files?.[0] || null;
    const inFile = document.getElementById("installPhoto")?.files?.[0] || null;

    const payload = {
  userId: p.userId,
  dealer, btu, serialNumber,
serialNumberPhoto: await fileToDataUrl_(snFile, { maxW: 2560, quality: 0.92, timeoutMs: 8000 }),
installPhoto: await fileToDataUrl_(inFile, { maxW: 1400, quality: 0.80, timeoutMs: 8000 })
  source: "user"
};
    // ✅ ไม่ให้รูปพังแล้วบล็อกการส่ง: ถ้าย่อไม่สำเร็จจะเป็น "" อยู่แล้ว
// แต่ถ้ารูปยาวมาก ให้ตัดทิ้งเพื่อให้ยิงติด
if (payload.serialNumberPhoto && payload.serialNumberPhoto.length > 1_800_000) payload.serialNumberPhoto = "";
if (payload.installPhoto && payload.installPhoto.length > 1_800_000) payload.installPhoto = "";
    const r = await apiPost("install", "create", payload);

    if (r && r.ok) {
      if (r.rejected) {
        showResult_("warn", "⚠️ ไม่ผ่าน: " + (r.rejectReason || "พบ Serial Number ซ้ำ"));
      } else {
        showResult_("ok", "✅ ผ่าน: บันทึกการลงติดตั้งเรียบร้อยแล้ว");
      }
      resetInstallForm_();
    } else {
      showResult_("err", "❌ บันทึกไม่สำเร็จ: " + ((r && r.error) ? r.error : "unknown"));
    }

  } catch(err){
    showResult_("err", "❌ เกิดข้อผิดพลาด: " + String(err));
  }
}

function resetInstallForm_(){
  document.getElementById("dealer").value = "";
  document.getElementById("btu").value = "";
  document.getElementById("serialNumber").value = "";
  document.getElementById("serialNumberPhoto").value = "";
  document.getElementById("installPhoto").value = "";
}
  
</script>
  
</body>
</html>
