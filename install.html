<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install</title>
  <link rel="stylesheet" href="style.css?v=20260225_3">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="Logo-Macaw-สีดำ1.png" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="title">ติดตั้ง</div>
      <div class="badge">Install</div>
    </div>
  </div>

  <div class="card">
    <div class="mini">UserId: <span id="userId">-</span></div>

    <label>ชื่อร้านค้า (Dealer) <span class="req">*</span></label>
    <input id="dealer" placeholder="เช่น ร้านกอ จำกัด">

    <label>ขนาด BTU ที่ติดตั้ง <span class="req">*</span></label>
    <select id="btu" required>
      <option value="">เลือก</option>
      <option value="09-12 BTU">09-12 BTU</option>
      <option value="18-24 BTU">18-24 BTU</option>
    </select>

    <label>หมายเลขเครื่อง (Serial Number) <span class="req">*</span></label>
    <input id="serialNumber" placeholder="SN..." required>

    <label>รูปภาพหมายเลขเครื่อง (Serial Number)<span class="req">*</span></label>
    <input id="serialNumberPhoto" type="file" accept="image/*" capture="environment" required>

    <label>รูปติดตั้ง<span class="req">*</span></label>
    <input id="installPhoto" type="file" accept="image/*" capture="environment" required>

    <div class="hr"></div>
    <button id="btnInstallSave" class="btn primary" onclick="submitInstall()">บันทึก</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="location.href='index.html'">กลับเมนู</button>
    <div id="toast" class="mini"></div>
    <div id="resultBox" class="result-box"></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-starter.js?v=20260225_3"></script>
<script>
async function fileToDataUrlCompressed_(file, opt = {}){
  try{
    if (!file) return "";

    const {
      maxW = 1600,
      quality = 0.82,
      forceJpeg = true
    } = opt;

    const imgUrl = URL.createObjectURL(file);
    const img = new Image();
    img.src = imgUrl;

    await new Promise((res, rej) => {
      img.onload = res;
      img.onerror = rej;
    });

    const scale = Math.min(1, maxW / img.width);
    const w = Math.round(img.width * scale);
    const h = Math.round(img.height * scale);

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(img, 0, 0, w, h);

    URL.revokeObjectURL(imgUrl);

    return forceJpeg
      ? canvas.toDataURL("image/jpeg", quality)
      : canvas.toDataURL(file.type || "image/png", quality);
  }catch(_){
    return "";
  }
}

function showResult_(type, msg){
  let box = document.getElementById("resultBox");

  if (!box) {
    const card = document.querySelector(".card");
    box = document.createElement("div");
    box.id = "resultBox";
    box.className = "result-box";
    if (card) card.appendChild(box);
    else document.body.appendChild(box);
  }

  box.className = "result-box " + (
  type === "ok" ? "result-ok" :
  type === "warn" ? "result-warn" :
  type === "loading" ? "result-loading" :
  "result-err"
);
  box.textContent = msg;
  box.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function setInstallLoading_(isLoading, msg){
  const btn = document.getElementById("btnInstallSave");
  if (btn){
    btn.disabled = isLoading;
    btn.innerHTML = isLoading
      ? `<span class="spinner"></span>กำลังอัปโหลด...`
      : `บันทึก`;
  }
  if (isLoading && msg) showResult_("loading", msg);
}
  
async function submitInstall(){
  try{
    const p = await waitProfile_();
    if (!p) return showResult_("err", "❌ LIFF ยังไม่พร้อม กรุณาลองใหม่");

    const dealer = document.getElementById("dealer").value.trim();
    const btu = document.getElementById("btu").value;
    const serialNumber = document.getElementById("serialNumber").value.trim();
    const snFile = document.getElementById("serialNumberPhoto")?.files?.[0] || null;
    const inFile = document.getElementById("installPhoto")?.files?.[0] || null;

    if (!dealer) return showResult_("err", "❌ กรุณากรอก Dealer");
    if (!btu) return showResult_("err", "❌ กรุณาเลือก BTU");
    if (!serialNumber) return showResult_("err", "❌ กรุณากรอก Serial Number");
    if (!snFile) return showResult_("err", "❌ กรุณาแนบรูป Serial Number");
    if (!inFile) return showResult_("err", "❌ กรุณาแนบรูปติดตั้ง");

    setInstallLoading_(true, "⏳ กำลังย่อรูปภาพหมายเลขเครื่อง...");
    const serialNumberPhoto = await fileToDataUrlCompressed_(snFile, { maxW: 1600, quality: 0.82 });

    setInstallLoading_(true, "⏳ กำลังย่อรูปติดตั้ง...");
    const installPhoto = await fileToDataUrlCompressed_(inFile, { maxW: 1600, quality: 0.82 });

    setInstallLoading_(true, "⏳ กำลังส่งข้อมูลไปยังระบบ...");
    const payload = {
      userId: p.userId,
      dealer,
      btu,
      serialNumber,
      serialNumberPhoto,
      installPhoto
    };

    const r = await apiPost("install", "create", payload);

    if (r && r.ok) {
      if (r.rejected) {
        showResult_("warn", "⚠️ เลขเครื่องซ้ำ ระบบรับข้อมูลไว้แล้ว กรุณารอเจ้าหน้าที่ตรวจสอบ");
      } else {
        showResult_("ok", "✅ บันทึกสำเร็จ: รับข้อมูลติดตั้งเรียบร้อยแล้ว");
      }
      resetInstallForm_();
    } else {
      const code = (r && r.error) ? r.error : "unknown";

      const msgMap = {
        "FETCH_FAILED": "⚠️ ไม่สามารถส่งข้อมูลได้ กรุณาตรวจสอบอินเทอร์เน็ตแล้วลองใหม่",
        "HTTP_403": "ไม่มีสิทธิ์เข้าถึงระบบ (403) กรุณาตรวจสิทธิ์การ Deploy",
        "HTTP_404": "ไม่พบปลายทาง (404) กรุณาตรวจสอบ WEB_APP_URL",
        "HTTP_413": "ข้อมูล/ไฟล์ใหญ่เกินไป (413) กรุณาลองใหม่อีกครั้ง",
        "INVALID_JSON": "ระบบตอบกลับผิดรูปแบบ กรุณาลองใหม่อีกครั้ง"
      };

      showResult_("err", "❌ บันทึกไม่สำเร็จ: " + (msgMap[code] || code));
    }

  } catch(err){
    showResult_("err", "❌ เกิดข้อผิดพลาด: " + String(err));
  } finally {
    setInstallLoading_(false);
  }
}

function resetInstallForm_(){
  document.getElementById("dealer").value = "";
  document.getElementById("btu").value = "";
  document.getElementById("serialNumber").value = "";
  document.getElementById("serialNumberPhoto").value = "";
  document.getElementById("installPhoto").value = "";
}
</script>
  
</body>
</html>
