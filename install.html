<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Install</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="Logo-Macaw-สีดำ1.png" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="title">ลงติดตั้ง</div>
      <div class="badge">Install</div>
    </div>
  </div>

  <div class="card">
    <div class="mini">UserId: <span id="userId">-</span></div>

    <label>Dealer</label>
    <input id="dealer" placeholder="เช่น D1">

    <label>BTU</label>
    <select id="btu">
      <option value="">เลือก</option>
      <option>09-12</option>
      <option>18-24</option>
    </select>

    <label>Serial Number</label>
    <input id="serialNumber" placeholder="SN...">

    <label>รูป Serial Number (ไม่บังคับ)</label>
    <input id="serialNumberPhoto" type="file" accept="image/*" capture="environment">

    <label>รูปติดตั้ง (ไม่บังคับ)</label>
    <input id="installPhoto" type="file" accept="image/*" capture="environment">

    <div class="hr"></div>
    <button class="btn primary" onclick="submitInstall()">บันทึก</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="location.href='index.html'">กลับเมนู</button>
    <div id="toast" class="mini"></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-starter.js"></script>
<script>
function fileToDataUrl_(file){
  return new Promise((resolve) => {
    if (!file) return resolve("");
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => resolve("");
    reader.readAsDataURL(file);
  });
}

async function submitInstall(){
  const p = await waitProfile_();
  if (!p) return toast("LIFF ยังไม่พร้อม กรุณาลองใหม่", false);

  const dealer = document.getElementById("dealer").value.trim();
  const btu = document.getElementById("btu").value;
  const serialNumber = document.getElementById("serialNumber").value.trim();

    // ✅ ADD: validate required fields
  if (!dealer) return toast("กรุณากรอก Dealer", false);
  if (!btu) return toast("กรุณาเลือก BTU", false);
  if (!serialNumber) return toast("กรุณากรอก Serial Number", false);

  const snFile = document.getElementById("serialNumberPhoto")?.files?.[0] || null;
  const inFile = document.getElementById("installPhoto")?.files?.[0] || null;

  const payload = {
    userId: p.userId,
    dealer,
    btu,
    serialNumber,
    serialNumberPhoto: await fileToDataUrl_(snFile),
    installPhoto: await fileToDataUrl_(inFile)
  };

  const r = await apiPost("install", "create", payload);
  if (r.ok) popup("บันทึกเสร็จสิ้นแล้ว ✅");
  else popup("บันทึกไม่สำเร็จ: " + (r.error || "unknown"), "เกิดข้อผิดพลาด ❌");
}
</script>

<!-- ✅ Popup Modal -->
<div id="modalOverlay" class="modal-overlay" onclick="closePopup()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">สำเร็จ ✅</h3>
    <p id="modalMsg">บันทึกเสร็จสิ้นแล้ว</p>
    <div class="actions">
      <button class="btn primary" onclick="closePopup()">ตกลง</button>
    </div>
  </div>
</div>
  
</body>
</html>
