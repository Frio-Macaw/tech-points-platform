<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redeem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="Logo-Macaw-สีดำ1.png" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="title">แลกแต้ม</div>
      <div class="badge">Redeems</div>
    </div>
  </div>

  <div class="card">
    <div class="mini">UserId: <span id="userId">-</span></div>

    <label>BTU</label>
    <select id="btu" required>
      <option value="">เลือก</option>
      <option value="09-12 BTU">09-12 BTU</option>
      <option value="18-24 BTU">18-24 BTU</option>
    </select>

    <label>จำนวนแต้มที่ต้องการใช้</label>
    <input id="points" type="number" min="1" step="1" placeholder="เช่น 10">
    <div class="mini">* เมื่อยืนยันแลก แต้มจะถูกหักทันทีเพื่อ “จองสิทธิ์”</div>

    <div class="hr"></div>
    <button class="btn danger" onclick="submitRedeem()">ยืนยันแลกแต้ม</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="location.href='index.html'">กลับเมนู</button>
    <div id="toast" class="mini"></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-starter.js?v=20260225_1"></script>
<script>
async function submitRedeem(){
  const p = await waitProfile_();
  if (!p) return toast("LIFF ยังไม่พร้อม กรุณาลองใหม่", false);

  const pts = Number(document.getElementById("points").value || 0);
  if (!Number.isFinite(pts) || pts <= 0) return toast("กรอกแต้มให้ถูกต้อง", false);

  const payload = { userId: p.userId, btu: document.getElementById("btu").value, points: pts };
  const r = await apiPost("redeems", "create", payload);

  if (r.ok) popup(`แลกสำเร็จ ✅ คงเหลือ ${r.balanceAfter} แต้ม`);
  else popup("แลกไม่สำเร็จ: " + (r.error || "unknown"), "เกิดข้อผิดพลาด ❌");
}
</script>

<!-- ✅ Popup Modal -->
<div id="modalOverlay" class="modal-overlay" onclick="closePopup()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">สำเร็จ ✅</h3>
    <p id="modalMsg">บันทึกเสร็จสิ้นแล้ว</p>
    <div class="actions">
      <button class="btn primary" onclick="closePopup()">ตกลง</button>
    </div>
  </div>
</div>
  
</body>
</html>
