<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="style.css?v=20260428_1">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="Logo-Macaw-สีดำ1.png" alt="logo" onerror="this.style.display='none'">
    <div>
      <div class="title">ลงทะเบียนช่าง</div>
      <div class="badge">Members</div>
    </div>
  </div>

  <div class="card">
    <div class="mini">UserId: <span id="userId">-</span></div>

    <label>ชื่อจริง <span class="req">*</span></label>
    <input id="name" placeholder="ชื่อจริง">

    <label>นามสกุล <span class="req">*</span></label>
    <input id="lastName" placeholder="นามสกุล">

    <label>เบอร์โทร <span class="req">*</span></label>
    <input id="phone" placeholder="08xxxxxxxx" inputmode="tel">

    <label>จังหวัด <span class="req">*</span></label>
    <input id="province" placeholder="เช่น กรุงเทพฯ">

    <label>ชื่อธนาคาร <span class="req">*</span></label>
    <input id="bankName" placeholder="เช่น KBank / SCB">

    <label>เลขที่บัญชี <span class="req">*</span></label>
    <input id="bankAccountNo" placeholder="เช่น 123-4-56789-0">

    <label>ชื่อบัญชี (ตามหน้าสมุดบัญชี) <span class="req">*</span></label>
    <input id="bankAccountName" placeholder="ชื่อ-นามสกุล">

    <label>อีเมล <span class="req">*</span></label>
    <input id="eMail" placeholder="เช่น name@email.com" inputmode="email">

    <label>รูปสมุดบัญชี (ไม่บังคับ)</label>
    <input id="bookBankPhoto" type="file"
  accept=".jpg,.jpeg,.heic,.heif,.dng,image/jpeg,image/heic,image/heif,image/dng,image/x-adobe-dng,image/*">
    <div class="mini">รูปเดิม (ถ้ามี):</div>
    <img id="prevBook" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;display:none;margin-top:6px;border:1px solid #26262b;">

    <label>รูปบัตรประชาชน (ไม่บังคับ)</label>
    <input id="idPhoto" type="file"
  accept=".jpg,.jpeg,.heic,.heif,.dng,image/jpeg,image/heic,image/heif,image/dng,image/x-adobe-dng,image/*">
    <div class="mini">รูปเดิม (ถ้ามี):</div>
    <img id="prevId" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;display:none;margin-top:6px;border:1px solid #26262b;">

    <div class="hr"></div>
    <button id="btnRegisterSave" class="btn primary" onclick="submitRegister()">บันทึก</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="location.href='index.html'">กลับเมนู</button>
    <div id="toast" class="mini"></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-starter.js?v=20260428_1"></script>

<script>

function getFileExt_(file){
  const name = String(file?.name || "");
  const m = name.match(/\.([^.]+)$/);
  return (m && m[1] ? m[1] : "").toLowerCase();
}

function readFileAsDataUrl_(file){
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ""));
    fr.onerror = () => reject(fr.error || new Error("READ_FILE_FAILED"));
    fr.readAsDataURL(file);
  });
}

function isCanvasFriendlyImage_(file){
  const type = String(file?.type || "").toLowerCase();
  const ext = getFileExt_(file);

  return (
    /^image\/(jpeg|jpg|png|webp|gif|bmp)$/i.test(type) ||
    ["jpg", "jpeg", "png", "webp", "gif", "bmp"].includes(ext)
  );
}

async function canvasToJpegDataUrl_(file, opt = {}){
  const {
    maxW = 2560,
    quality = 0.9
  } = opt;

  const imgUrl = URL.createObjectURL(file);
  try{
    const img = new Image();
    img.src = imgUrl;

    await new Promise((res, rej) => {
      img.onload = res;
      img.onerror = rej;
    });

    const scale = Math.min(1, maxW / (img.width || 1));
    const w = Math.max(1, Math.round(img.width * scale));
    const h = Math.max(1, Math.round(img.height * scale));

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(img, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", quality);
  } finally {
    URL.revokeObjectURL(imgUrl);
  }
}

async function fileToDataUrl_(file, opt = {}){
  if (!file) return "";

  const {
    maxW = 2560,
    quality = 0.9,
    maxRawMb = 20
  } = opt;

  const ext = getFileExt_(file);
  const isCanvasFriendly = isCanvasFriendlyImage_(file);

  try {
    // กลุ่มที่แปลงผ่าน canvas ได้ดี -> บีบอัดเป็น jpg
    if (isCanvasFriendly) {
      return await canvasToJpegDataUrl_(file, { maxW, quality });
    }

    // กลุ่ม HEIC / HEIF / DNG / อื่น ๆ
    // ไม่ฝืนแปลงผ่าน canvas แต่ส่งไฟล์เดิมเป็น base64 ตรง ๆ
    if (file.size > maxRawMb * 1024 * 1024) {
      throw new Error(`ไฟล์ ${file.name || ext || "รูปภาพ"} มีขนาดใหญ่เกิน ${maxRawMb} MB`);
    }

    return await readFileAsDataUrl_(file);

  } catch (err) {
    // fallback สุดท้าย: ลองอ่านเป็น base64 ตรง ๆ อีกครั้ง
    try {
      return await readFileAsDataUrl_(file);
    } catch (_) {
      throw new Error(`ไม่สามารถอ่านไฟล์ ${file.name || ""} ได้`);
    }
  }
}

function driveIdFromUrl_(url){
  const s = String(url || "").trim();
  if (!s) return "";
  let m = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return m[1];
  m = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return m[1];
  // เผื่อเก็บเป็น id ตรง ๆ
  if (/^[a-zA-Z0-9_-]{20,}$/.test(s)) return s;
  return "";
}

function normalizeDriveImgUrl_(url){
  const id = driveIdFromUrl_(url);
  if (!id) return String(url || "");
  // ✅ thumbnail เสถียรสุดใน LIFF/มือถือ
  return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
}
  
async function loadDraftFromSheet_(){
  const p = await waitProfile_();
  if (!p) return;

  const r = await apiPost("members", "get", { userId: p.userId });
  if (!r || !r.ok || r.mode !== "found") {
    // ถ้าในชีทยังไม่มี row แต่ LIFF มี email ก็เติมให้ก่อน
    const liffEmail = String(window.__LIFF_EMAIL__ || "").trim();
    if (liffEmail) {
      const emailEl = document.getElementById("eMail");
      if (emailEl && !emailEl.value) emailEl.value = liffEmail;
    }
    return;
  }

  const d = r.data || {};

  const setVal = (id, v) => {
    const el = document.getElementById(id);
    if (!el) return;
    const s = (v === undefined || v === null) ? "" : String(v);
    if (s.trim() !== "") el.value = s;
  };

  setVal("name", d.name);
  setVal("lastName", d.lastName);
  setVal("phone", d.phone);
  setVal("province", d.province);
  setVal("bankName", d.bankName);
  setVal("bankAccountNo", d.bankAccountNo);
  setVal("bankAccountName", d.bankAccountName);

  const liffEmail = String(window.__LIFF_EMAIL__ || "").trim();
  setVal("eMail", d.eMail || d.eMail_2 || liffEmail);

  const prevBook = document.getElementById("prevBook");
  if (prevBook && d.bookBankPhoto) {
    prevBook.src = normalizeDriveImgUrl_(d.bookBankPhoto);
    prevBook.style.display = "block";
  }

  const prevId = document.getElementById("prevId");
  if (prevId && d.idPhoto) {
    prevId.src = normalizeDriveImgUrl_(d.idPhoto);
    prevId.style.display = "block";
  }

  toast("โหลดข้อมูลเดิมแล้ว ✅ แก้ไขได้เลย", true);
}

function setRegisterLoading_(isLoading, msg){
  const btn = document.getElementById("btnRegisterSave");
  if (btn){
    btn.disabled = isLoading;
    btn.innerHTML = isLoading
      ? `<span class="spinner"></span>กำลังอัปโหลด...`
      : `บันทึก`;
  }
  if (msg) toast(msg, true);
}
  
async function submitRegister(){
  try {
    const p = await waitProfile_();
    if (!p) return toast("LIFF ยังไม่พร้อม กรุณาเปิดใน LINE", false);

    const name = document.getElementById("name")?.value.trim() || "";
    const lastName = document.getElementById("lastName")?.value.trim() || "";
    const phone = document.getElementById("phone")?.value.trim() || "";
    const province = document.getElementById("province")?.value.trim() || "";

    const bankName = document.getElementById("bankName")?.value.trim() || "";
    const bankAccountNo = document.getElementById("bankAccountNo")?.value.trim() || "";
    const bankAccountName = document.getElementById("bankAccountName")?.value.trim() || "";

    const liffEmail = String(window.__LIFF_EMAIL__ || "").trim();
    const eMail = document.getElementById("eMail")?.value.trim() || liffEmail || "";

    const missing = [];
    if (!name) missing.push("ชื่อ");
    if (!lastName) missing.push("นามสกุล");
    if (!phone) missing.push("เบอร์โทร");
    if (!province) missing.push("จังหวัด");
    if (!bankName) missing.push("ชื่อธนาคาร");
    if (!bankAccountNo) missing.push("เลขที่บัญชี");
    if (!bankAccountName) missing.push("ชื่อบัญชี");
    if (!eMail) missing.push("อีเมล");

    if (missing.length) return toast("กรุณากรอกให้ครบ: " + missing.join(", "), false);

    const bookFile = document.getElementById("bookBankPhoto")?.files?.[0] || null;
    const idFile   = document.getElementById("idPhoto")?.files?.[0] || null;

    setRegisterLoading_(true, "⏳ กำลังเตรียมรูปสมุดบัญชี...");
    const bookBankPhoto = await fileToDataUrl_(bookFile, { maxW: 1800, quality: 0.82 });

    setRegisterLoading_(true, "⏳ กำลังเตรียมรูปบัตรประชาชน...");
    const idPhoto = await fileToDataUrl_(idFile, { maxW: 1800, quality: 0.82 });

    const payload = {
      userId: p.userId,
      displayName: p.displayName || "",
      pictureUrl: p.pictureUrl || "",
      name,
      lastName,
      phone,
      province,
      bankName,
      bankAccountNo,
      bankAccountName,
      eMail,
      eMail_2: liffEmail || "",
      bookBankPhoto,
      idPhoto,
      source: "user"
    };

    setRegisterLoading_(true, "⏳ กำลังส่งข้อมูลลงทะเบียน...");
    const r = await apiPost("members", "upsert", payload);
    console.log("members upsert =", r);

    if (r && r.ok) {
      // กันอีกชั้น เผื่อ upsert สำเร็จแล้วค่อย patch LINE email ซ้ำ
      if (liffEmail) {
        const r2 = await apiPost("members", "patchEmail2", {
          userId: p.userId,
          eMail_2: liffEmail
        });
        console.log("patchEmail2 after upsert =", r2);

        if (r2 && r2.ok && r2.mode === "patched") {
          localStorage.setItem(`emailSaved:v3:${p.userId}`, liffEmail);
        }
      }

      popup("บันทึกเสร็จสิ้นแล้ว ✅");
    } else {
      popup("บันทึกไม่สำเร็จ: " + (r?.error || "unknown"), "เกิดข้อผิดพลาด ❌");
    }

  } catch (err) {
    toast("บันทึกไม่สำเร็จ: " + String(err), false);
  } finally {
    setRegisterLoading_(false, "");
  }
}

  window.addEventListener("load", () => {
  // รอ LIFF init จาก liff-starter.js แล้วค่อยโหลด draft
  setTimeout(() => loadDraftFromSheet_().catch(()=>{}), 300);
});
  
</script>

<!-- ✅ Popup Modal -->
<div id="modalOverlay" class="modal-overlay" onclick="closePopup()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">สำเร็จ</h3>
    <p id="modalMsg">บันทึกเสร็จสิ้นแล้ว</p>
    <div class="actions">
      <button class="btn primary" onclick="closePopup()">ตกลง</button>
    </div>
  </div>
</div>
  
</body>
</html>
