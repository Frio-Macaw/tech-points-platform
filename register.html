<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <link rel="stylesheet" href="style.css?v=20260428_1">
  <style>
    body { margin: 0; padding: 0; background: linear-gradient(180deg, #9DE0E9 0%, #3891CE 100%); min-height: 100vh; }
    .reg-wrap { padding: 24px 16px 40px; font-family: sans-serif; }
    .reg-title { text-align: center; font-size: 22px; font-weight: 700; color: #02497E; margin-bottom: 16px; }
    .reg-card { background: #2e2e2e; border-radius: 16px; padding: 16px; }
    .reg-toprow { display: flex; align-items: center; justify-content: flex-end; gap: 10px; margin-bottom: 16px; }
    .reg-badge { font-size: 13px; color: #3392D2; font-weight: 600; }
    .reg-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #F5D547; flex-shrink: 0; }
    .reg-label { font-size: 13px; color: #F8FAFC; display: block; margin-bottom: 4px; margin-top: 12px; }
    .reg-req { color: #ff4444; }
    .reg-input {
      width: 100%; box-sizing: border-box;
      background: #3d3d3d; border: none; border-radius: 8px;
      padding: 10px 12px; color: #F8FAFC; font-size: 14px;
    }
    .reg-input::placeholder { color: #b0b8c1; }
    .reg-input:focus { outline: none; background: #4a4a4a; }
    .reg-hr { height: 1px; background: #444; margin: 20px 0 16px; }
    .reg-btn-save {
      width: 100%; background: #22c55e; border: none; border-radius: 8px;
      padding: 13px; color: #fff; font-size: 15px; font-weight: 700;
      margin-bottom: 10px; cursor: pointer;
    }
    .reg-btn-save:disabled { opacity: 0.6; }
    .reg-btn-back {
      width: 100%; background: #FFF9C4; border: none; border-radius: 8px;
      padding: 13px; color: #02497E; font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .reg-prev-img {
      width: 100%; max-height: 180px; object-fit: cover;
      border-radius: 12px; display: none; margin-top: 6px;
      border: 1px solid #444;
    }
    .reg-file-label { color: #b0b8c1; font-size: 13px; }
  </style>
</head>
<body>

<div class="reg-wrap">

  <div class="reg-title">ลงทะเบียนช่าง</div>

  <div class="reg-card">

    <div class="reg-toprow">
      <span id="displayName" style="font-size:13px;color:#3392D2;font-weight:600"></span>
      <img id="profilePic" class="reg-avatar" src="" alt=""
        onerror="this.style.background='#F5D547';this.removeAttribute('src')">
    </div>

    <label class="reg-label">ชื่อจริง <span class="reg-req">*</span></label>
    <input class="reg-input" id="name" placeholder="ชื่อจริง">

    <label class="reg-label">นามสกุล <span class="reg-req">*</span></label>
    <input class="reg-input" id="lastName" placeholder="นามสกุล">

    <label class="reg-label">เบอร์โทร <span class="reg-req">*</span></label>
    <input class="reg-input" id="phone" placeholder="08xxxxxxxx" inputmode="tel">

    <label class="reg-label">จังหวัด <span class="reg-req">*</span></label>
    <input class="reg-input" id="province" placeholder="เช่น กรุงเทพฯ">

    <label class="reg-label">ชื่อธนาคาร <span class="reg-req">*</span></label>
    <input class="reg-input" id="bankName" placeholder="เช่น กสิกร / กรุงไทย">

    <label class="reg-label">เลขที่บัญชี <span class="reg-req">*</span></label>
    <input class="reg-input" id="bankAccountNo" placeholder="เช่น 123-4-56789-0">

    <label class="reg-label">ชื่อบัญชี (ตามหน้าสมุดบัญชี) <span class="reg-req">*</span></label>
    <input class="reg-input" id="bankAccountName" placeholder="ชื่อ-นามสกุล">

    <label class="reg-label">อีเมล <span class="reg-req">*</span></label>
    <input class="reg-input" id="eMail" placeholder="เช่น name@email.com" inputmode="email">

    <label class="reg-label">รูปสมุดบัญชี (ไม่บังคับ)</label>
    <input class="reg-input" id="bookBankPhoto" type="file"
      accept=".jpg,.jpeg,.heic,.heif,.dng,image/jpeg,image/heic,image/heif,image/dng,image/x-adobe-dng,image/*">
    <img id="prevBook" class="reg-prev-img" alt="รูปสมุดบัญชี">

    <label class="reg-label">รูปบัตรประชาชน (ไม่บังคับ)</label>
    <input class="reg-input" id="idPhoto" type="file"
      accept=".jpg,.jpeg,.heic,.heif,.dng,image/jpeg,image/heic,image/heif,image/dng,image/x-adobe-dng,image/*">
    <img id="prevId" class="reg-prev-img" alt="รูปบัตรประชาชน">

    <div class="reg-hr"></div>
    <button id="btnRegisterSave" class="reg-btn-save" onclick="submitRegister()">บันทึก</button>
    <button class="reg-btn-back" onclick="location.href='index.html'">กลับเมนู</button>
    <div id="toast" class="mini" style="margin-top:10px"></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="liff-starter.js?v=20260428_1"></script>

<script>

function getFileExt_(file){
  const name = String(file?.name || "");
  const m = name.match(/\.([^.]+)$/);
  return (m && m[1] ? m[1] : "").toLowerCase();
}

function readFileAsDataUrl_(file){
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ""));
    fr.onerror = () => reject(fr.error || new Error("READ_FILE_FAILED"));
    fr.readAsDataURL(file);
  });
}

function isCanvasFriendlyImage_(file){
  const type = String(file?.type || "").toLowerCase();
  const ext = getFileExt_(file);
  return (
    /^image\/(jpeg|jpg|png|webp|gif|bmp)$/i.test(type) ||
    ["jpg", "jpeg", "png", "webp", "gif", "bmp"].includes(ext)
  );
}

async function canvasToJpegDataUrl_(file, opt = {}){
  const { maxW = 2560, quality = 0.9 } = opt;
  const imgUrl = URL.createObjectURL(file);
  try{
    const img = new Image();
    img.src = imgUrl;
    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
    const scale = Math.min(1, maxW / (img.width || 1));
    const w = Math.max(1, Math.round(img.width * scale));
    const h = Math.max(1, Math.round(img.height * scale));
    const canvas = document.createElement("canvas");
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(img, 0, 0, w, h);
    return canvas.toDataURL("image/jpeg", quality);
  } finally {
    URL.revokeObjectURL(imgUrl);
  }
}

async function fileToDataUrl_(file, opt = {}){
  if (!file) return "";
  const { maxW = 2560, quality = 0.9, maxRawMb = 20 } = opt;
  const ext = getFileExt_(file);
  const isCanvasFriendly = isCanvasFriendlyImage_(file);
  try {
    if (isCanvasFriendly) return await canvasToJpegDataUrl_(file, { maxW, quality });
    if (file.size > maxRawMb * 1024 * 1024)
      throw new Error(`ไฟล์ ${file.name || ext || "รูปภาพ"} มีขนาดใหญ่เกิน ${maxRawMb} MB`);
    return await readFileAsDataUrl_(file);
  } catch (err) {
    try { return await readFileAsDataUrl_(file); }
    catch (_) { throw new Error(`ไม่สามารถอ่านไฟล์ ${file.name || ""} ได้`); }
  }
}

function driveIdFromUrl_(url){
  const s = String(url || "").trim();
  if (!s) return "";
  let m = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return m[1];
  m = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m && m[1]) return m[1];
  if (/^[a-zA-Z0-9_-]{20,}$/.test(s)) return s;
  return "";
}

function normalizeDriveImgUrl_(url){
  const id = driveIdFromUrl_(url);
  if (!id) return String(url || "");
  return `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;
}

async function loadDraftFromSheet_(){
  const p = await waitProfile_();
  if (!p) return;

  // ดึงรูปโปรไฟล์และชื่อ LINE
  const picEl = document.getElementById("profilePic");
  if (picEl && p.pictureUrl) picEl.src = p.pictureUrl;

  const nameEl = document.getElementById("displayName");
  if (nameEl && p.displayName) nameEl.textContent = p.displayName;

  const r = await apiPost("members", "get", { userId: p.userId });
  if (!r || !r.ok || r.mode !== "found") {
    const liffEmail = String(window.__LIFF_EMAIL__ || "").trim();
    if (liffEmail) {
      const emailEl = document.getElementById("eMail");
      if (emailEl && !emailEl.value) emailEl.value = liffEmail;
    }
    return;
  }

  const d = r.data || {};
  const setVal = (id, v) => {
    const el = document.getElementById(id);
    if (!el) return;
    const s = (v === undefined || v === null) ? "" : String(v);
    if (s.trim() !== "") el.value = s;
  };

  setVal("name", d.name);
  setVal("lastName", d.lastName);
  setVal("phone", d.phone);
  setVal("province", d.province);
  setVal("bankName", d.bankName);
  setVal("bankAccountNo", d.bankAccountNo);
  setVal("bankAccountName", d.bankAccountName);

  const liffEmail = String(window.__LIFF_EMAIL__ || "").trim();
  setVal("eMail", d.eMail || d.eMail_2 || liffEmail);

  const prevBook = document.getElementById("prevBook");
  if (prevBook && d.bookBankPhoto) {
    prevBook.src = normalizeDriveImgUrl_(d.bookBankPhoto);
    prevBook.style.display = "block";
  }

  const prevId = document.getElementById("prevId");
  if (prevId && d.idPhoto) {
    prevId.src = normalizeDriveImgUrl_(d.idPhoto);
    prevId.style.display = "block";
  }

  toast("โหลดข้อมูลเดิมแล้ว ✅ แก้ไขได้เลย", true);
}

function setRegisterLoading_(isLoading, msg){
  const btn = document.getElementById("btnRegisterSave");
  if (btn){
    btn.disabled = isLoading;
    btn.innerHTML = isLoading ? `<span class="spinner"></span>กำลังอัปโหลด...` : `บันทึก`;
  }
  if (msg) toast(msg, true);
}

async function submitRegister(){
  try {
    const p = await waitProfile_();
    if (!p) return toast("LIFF ยังไม่พร้อม กรุณาเปิดใน LINE", false);

    const name           = document.getElementById("name")?.value.trim() || "";
    const lastName       = document.getElementById("lastName")?.value.trim() || "";
    const phone          = document.getElementById("phone")?.value.trim() || "";
    const province       = document.getElementById("province")?.value.trim() || "";
    const bankName       = document.getElementById("bankName")?.value.trim() || "";
    const bankAccountNo  = document.getElementById("bankAccountNo")?.value.trim() || "";
    const bankAccountName= document.getElementById("bankAccountName")?.value.trim() || "";
    const liffEmail      = String(window.__LIFF_EMAIL__ || "").trim();
    const eMail          = document.getElementById("eMail")?.value.trim() || liffEmail || "";

    const missing = [];
    if (!name)           missing.push("ชื่อ");
    if (!lastName)       missing.push("นามสกุล");
    if (!phone)          missing.push("เบอร์โทร");
    if (!province)       missing.push("จังหวัด");
    if (!bankName)       missing.push("ชื่อธนาคาร");
    if (!bankAccountNo)  missing.push("เลขที่บัญชี");
    if (!bankAccountName)missing.push("ชื่อบัญชี");
    if (!eMail)          missing.push("อีเมล");

    if (missing.length) return toast("กรุณากรอกให้ครบ: " + missing.join(", "), false);

    const bookFile = document.getElementById("bookBankPhoto")?.files?.[0] || null;
    const idFile   = document.getElementById("idPhoto")?.files?.[0] || null;

    setRegisterLoading_(true, "⏳ กำลังเตรียมรูปสมุดบัญชี...");
    const bookBankPhoto = await fileToDataUrl_(bookFile, { maxW: 1200, quality: 0.75 });

    setRegisterLoading_(true, "⏳ กำลังเตรียมรูปบัตรประชาชน...");
    const idPhoto = await fileToDataUrl_(idFile, { maxW: 1200, quality: 0.75 });

    const payload = {
      userId: p.userId,
      displayName: p.displayName || "",
      pictureUrl: p.pictureUrl || "",
      name, lastName, phone, province,
      bankName, bankAccountNo, bankAccountName,
      eMail, eMail_2: liffEmail || "",
      bookBankPhoto, idPhoto,
      source: "user"
    };

    setRegisterLoading_(true, "⏳ กำลังส่งข้อมูลลงทะเบียน...");
    const r = await apiPost("members", "upsert", payload);
    console.log("members upsert =", r);

    if (r && r.ok) {
      if (liffEmail) {
        const r2 = await apiPost("members", "patchEmail2", {
          userId: p.userId, eMail_2: liffEmail
        });
        console.log("patchEmail2 after upsert =", r2);
        if (r2 && r2.ok && r2.mode === "patched") {
          localStorage.setItem(`emailSaved:v3:${p.userId}`, liffEmail);
        }
      }
      popup("บันทึกเสร็จสิ้นแล้ว ✅");
    } else {
      popup("บันทึกไม่สำเร็จ: " + (r?.error || "unknown"), "เกิดข้อผิดพลาด ❌");
    }

  } catch (err) {
    toast("บันทึกไม่สำเร็จ: " + String(err), false);
  } finally {
    setRegisterLoading_(false, "");
  }
}

// แสดง preview รูปทันทีที่เลือกไฟล์
function bindPreview_(inputId, imgId){
  const inp = document.getElementById(inputId);
  const img = document.getElementById(imgId);
  if (!inp || !img) return;
  inp.addEventListener("change", () => {
    const file = inp.files?.[0];
    if (!file) { img.style.display = "none"; img.src = ""; return; }
    const url = URL.createObjectURL(file);
    img.onload = () => URL.revokeObjectURL(url);
    img.src = url;
    img.style.display = "block";
  });
}

window.addEventListener("load", () => {
  bindPreview_("bookBankPhoto", "prevBook");
  bindPreview_("idPhoto", "prevId");

  // แสดงรูปและชื่อ LINE ทันทีที่ LIFF พร้อม (ไม่ต้องรอ sheet API)
  const waitPic = setInterval(() => {
    const p = window.__LIFF_PROFILE__;
    if (!p) return;
    clearInterval(waitPic);
    const picEl = document.getElementById("profilePic");
    if (picEl && p.pictureUrl) picEl.src = p.pictureUrl;
    const nameEl = document.getElementById("displayName");
    if (nameEl) nameEl.textContent = p.displayName || "";
  }, 100);
  setTimeout(() => clearInterval(waitPic), 8000);

  setTimeout(() => loadDraftFromSheet_().catch(() => {}), 300);
});

</script>

<!-- Popup Modal -->
<div id="modalOverlay" class="modal-overlay" onclick="closePopup()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">สำเร็จ</h3>
    <p id="modalMsg">บันทึกเสร็จสิ้นแล้ว</p>
    <div class="actions">
      <button class="btn primary" onclick="closePopup()">ตกลง</button>
    </div>
  </div>
</div>

</body>
</html>
